<!DOCTYPE html>

<head>

<body>

        <input type="submit">

        <hr>
        <span>以下按鈕用處皆一樣</span><br>
        <button>送出</button><br>

        <hr>

        電話: <input type="text" name="tel"><br>
        <button onclick="alert('註冊成功')">送出</button>
        <input type="reset" value="取消"><br>

        <hr>
        <input type="radio" name="dept">
        <label>資訊工程系</label><br>

        <textarea readonly>無法刪除</textarea><br>
        <textarea placeholder="自行輸入" rows="4" col="30"></textarea><br>

        <hr>

        <fieldset>
            <legend>個人基本資料</legend>
            姓名: <input type="text" name="name"><br>
            電話: <input type="text" name="tel"><br>
            年紀: <input type="text" name="age"><br>

                <option value="1">資訊工程系</option>

            </select>
        </fieldset>
        <fieldset>

            <input type="radio" name="inst">
